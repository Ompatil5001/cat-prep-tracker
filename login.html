<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — CAT Prep Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
<!-- Firebase (same SDK version as index.html) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>

<!-- Shown only while we check whether you're already signed in -->
<div class="login-loading" id="login-loading">
  <div class="spinner"></div>
</div>

<div class="login-shell">
  <div class="login-card" id="login-card" style="display:none">
    <div class="login-logo">
      <span class="logo-mark">📐</span>
      <div class="brand">Prep <span>Tracker</span></div>
    </div>
    <p class="login-eyebrow">CAT 2026</p>

    <h1 class="login-title">Welcome back</h1>
    <p class="login-sub">Sign in to sync your quant topics, daily tasks, and reading log across all your devices.</p>

    <button class="google-btn" id="google-btn" onclick="signInWithGoogle()">
      <svg class="g-icon" viewBox="0 0 48 48" width="18" height="18">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.1 29.3 3 24 3 16.1 3 9.3 7.5 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 45c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 36.4 26.7 37 24 37c-5.3 0-9.7-3.4-11.3-8l-6.6 5.1C9.2 40.4 16 45 24 45z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.2-4.1 5.6l6.2 5.2C40.9 35.9 45 30.5 45 24c0-1.2-.1-2.4-.4-3.5z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <p class="login-status" id="login-status"></p>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
